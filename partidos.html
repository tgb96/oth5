<script>
const FIXTURE_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vR4Uc2YiXkim8OTwSbwK4AYfC1oWWNTX1TCE4RXFyzaK5azjuaHx4nWT1v6Ubiq2Lm9kpYFTJmY6C1d/pub?gid=0&single=true&output=csv";

const REGISTRO_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vR4Uc2YiXkim8OTwSbwK4AYfC1oWWNTX1TCE4RXFyzaK5azjuaHx4nWT1v6Ubiq2Lm9kpYFTJmY6C1d/pub?gid=1046180821&single=true&output=csv";

const encabezados = [
  "Semana",
  "Cancha",
  "Turno",
  "Categoría",
  "Jugador 1",
  "Jugador 2",
  "Estado del partido",
  "Observaciones"
];

const buscador = document.getElementById("buscador");

const tablaBusquedaHead = document.querySelector("#tablaBusqueda thead");
const tablaBusquedaBody = document.querySelector("#tablaBusqueda tbody");
const cardsBusqueda = document.getElementById("cardsBusqueda");

const tablaPendientesHead = document.querySelector("#tablaPendientes thead");
const tablaPendientesBody = document.querySelector("#tablaPendientes tbody");
const accordionPendientes = document.getElementById("accordionPendientes");

const tablaCompletaHead = document.querySelector("#tablaCompleta thead");
const tablaCompletaBody = document.querySelector("#tablaCompleta tbody");
const accordionSemanas = document.getElementById("accordionSemanas");

const RE_TILDES = /[\u0300-\u036f]/g;
const RE_NBSP = /\u00a0/g;
const RE_ZERO_WIDTH = /[\u200B-\u200D\uFEFF]/g;
const RE_ESPACIOS = /\s+/g;
const RE_MARCADOR = /(\d+\s*-\s*\d+(?:\s+\d+\s*-\s*\d+)*)/;
const SANTIAGO_OFFSET_MINUTOS = -4 * 60;
const MS_MINUTO = 60 * 1000;
const normalizarCache = new Map();
const limpiarCache = new Map();
const abreviarCache = new Map();

function normalizar(texto) {
  const original = String(texto || "");

  if (normalizarCache.has(original)) {
    return normalizarCache.get(original);
  }

  const valor = original
    .toLowerCase()
    .normalize("NFD")
    .replace(RE_TILDES, "")
    .replace(RE_NBSP, " ")
    .replace(RE_ZERO_WIDTH, "")
    .replace(RE_ESPACIOS, " ")
    .trim();

  normalizarCache.set(original, valor);
  return valor;
}

function limpiarNombre(nombre) {
  const original = String(nombre || "");

  if (limpiarCache.has(original)) {
    return limpiarCache.get(original);
  }

  const valor = normalizar(original)
    .replace(/-/g, "")
    .trim();

  limpiarCache.set(original, valor);
  return valor;
}

function escapeHTML(valor) {
  return String(valor || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function abreviarNombre(nombre) {
  const nombreOriginal = String(nombre || "")
    .trim()
    .replace(RE_ESPACIOS, " ");

  if (abreviarCache.has(nombreOriginal)) {
    return abreviarCache.get(nombreOriginal);
  }

  const nombreNormalizado = normalizar(nombreOriginal);
  let valor = "";

  if (nombreNormalizado === "maria jose valladares") {
    valor = "María José V.";
  } else {
    const partes = nombreOriginal
      .split(" ")
      .filter(Boolean);

    if (partes.length === 0) {
      valor = "";
    } else if (partes.length === 1) {
      valor = partes[0];
    } else {
      const primerNombre = partes[0];
      const apellido = partes[partes.length - 1];
      const inicialApellido = apellido.charAt(0).toUpperCase();

      valor = `${primerNombre} ${inicialApellido}.`;
    }
  }

  abreviarCache.set(nombreOriginal, valor);
  return valor;
}

function extraerMarcador(resultado) {
  const texto = String(resultado || "")
    .trim()
    .replace(RE_ESPACIOS, " ");

  const match = texto.match(RE_MARCADOR);

  if (!match) return "";

  return match[1].replace(/\s*-\s*/g, "-");
}

function resultadoResumido(registro) {
  if (!registro) return "";

  const resultadoWeb = String(registro.resultadoWeb || "").trim();
  const ganador = String(registro.ganador || "").trim();

  if (!resultadoWeb) return "";

  if (!ganador) {
    return resultadoWeb;
  }

  const ganadorCorto = abreviarNombre(ganador);
  const marcador = extraerMarcador(resultadoWeb);

  return marcador
    ? `Ganador ${ganadorCorto} ${marcador}`
    : `Ganador ${ganadorCorto}`;
}

function claveExacta(j1, j2) {
  return limpiarNombre(j1) + "|" + limpiarNombre(j2);
}

function claveOrdenada(j1, j2) {
  return [limpiarNombre(j1), limpiarNombre(j2)].sort().join("|");
}

function etiquetaSemanaBase(valor, mapaSemanas) {
  const texto = String(valor || "").trim();
  let base = "";

  if (mapaSemanas && mapaSemanas[texto]) {
    base = String(mapaSemanas[texto] || "").trim();
  } else if (normalizar(texto).startsWith("semana")) {
    base = texto;
  } else {
    base = "Semana " + texto;
  }

  return base.split(" · ")[0].trim();
}

function formatearFechaSemana(fechaTexto) {
  const texto = String(fechaTexto || "").trim();

  if (!texto) return "";

  const match = texto.match(/^(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{2,4})$/);

  if (!match) {
    return texto;
  }

  const dia = Number(match[1]);
  const mes = Number(match[2]);
  let anio = Number(match[3]);

  if (!dia || !mes || !anio) {
    return texto;
  }

  if (anio < 100) {
    anio += 2000;
  }

  const fecha = new Date(anio, mes - 1, dia);

  if (
    Number.isNaN(fecha.getTime()) ||
    fecha.getFullYear() !== anio ||
    fecha.getMonth() !== mes - 1 ||
    fecha.getDate() !== dia
  ) {
    return texto;
  }

  const dias = [
    "Domingo",
    "Lunes",
    "Martes",
    "Miércoles",
    "Jueves",
    "Viernes",
    "Sábado"
  ];

  const meses = [
    "enero",
    "febrero",
    "marzo",
    "abril",
    "mayo",
    "junio",
    "julio",
    "agosto",
    "septiembre",
    "octubre",
    "noviembre",
    "diciembre"
  ];

  const diaSemana = dias[fecha.getDay()];
  const diaTexto = String(dia).padStart(2, "0");
  const mesTexto = meses[mes - 1];

  return `${diaSemana} ${diaTexto} de ${mesTexto}`;
}

function construirEtiquetaSemana(semana, fechaSemana, mapaSemanas) {
  const base = etiquetaSemanaBase(semana, mapaSemanas);
  const fecha = formatearFechaSemana(fechaSemana);

  return fecha ? `${base} · ${fecha}` : base;
}

function etiquetaSemana(valor, mapaSemanas) {
  const texto = String(valor || "").trim();

  if (mapaSemanas && mapaSemanas[texto]) {
    return mapaSemanas[texto];
  }

  return etiquetaSemanaBase(texto, mapaSemanas);
}

function extraerNumeroSemana(texto) {
  const match = String(texto || "").match(/semana\s*(\d+)/i);
  return match ? match[1] : "";
}

function parseFechaProgramacionSantiago(fechaTexto) {
  const texto = String(fechaTexto || "").trim();
  const match = texto.match(/^(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{2,4})$/);

  if (!match) return null;

  const dia = Number(match[1]);
  const mes = Number(match[2]);
  let anio = Number(match[3]);

  if (!dia || !mes || !anio) return null;
  if (anio < 100) anio += 2000;

  const fechaUTC = new Date(Date.UTC(anio, mes - 1, dia));

  if (
    fechaUTC.getUTCFullYear() !== anio ||
    fechaUTC.getUTCMonth() !== mes - 1 ||
    fechaUTC.getUTCDate() !== dia
  ) {
    return null;
  }

  return Date.UTC(anio, mes - 1, dia);
}

function obtenerSemanaProxima(filas) {
  const hoySantiago = inicioDiaActualSantiagoGMT4();
  const fechasPorSemana = new Map();

  for (let i = 0; i < filas.length; i++) {
    const fila = filas[i];
    const fechaProgramada = parseFechaProgramacionSantiago(fila.fechaSemana);

    if (fechaProgramada === null || fechaProgramada < hoySantiago) continue;

    const semana = String(fila.semana || "").trim();

    if (!semana) continue;

    if (!fechasPorSemana.has(semana) || fechaProgramada < fechasPorSemana.get(semana)) {
      fechasPorSemana.set(semana, fechaProgramada);
    }
  }

  let semanaProxima = "";
  let fechaMasCercana = Infinity;

  fechasPorSemana.forEach((fecha, semana) => {
    if (fecha < fechaMasCercana) {
      fechaMasCercana = fecha;
      semanaProxima = semana;
    }
  });

  return semanaProxima;
}

function marcarSemanaProxima(filas, semanaProxima) {
  for (let i = 0; i < filas.length; i++) {
    filas[i]._esSemanaProxima = Boolean(semanaProxima && filas[i].semana === semanaProxima);
  }
}

function semanaProximaEnCanchas(canchas) {
  for (const filasCancha of canchas.values()) {
    for (let i = 0; i < filasCancha.length; i++) {
      if (filasCancha[i]._esSemanaProxima) return true;
    }
  }

  return false;
}

function parseCSVLine(line) {
  const result = [];
  let current = "";
  let insideQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const char = line[i];

    if (char === '"' && line[i + 1] === '"') {
      current += '"';
      i++;
    } else if (char === '"') {
      insideQuotes = !insideQuotes;
    } else if (char === "," && !insideQuotes) {
      result.push(current);
      current = "";
    } else {
      current += char;
    }
  }

  result.push(current);
  return result;
}

function parseCSV(csv) {
  const texto = String(csv || "").trim();
  if (!texto) return [];
  return texto.split(/\r?\n/).slice(1).map(parseCSVLine);
}

function claseEstado(estado) {
  const e = normalizar(estado);

  if (e.includes("jugado")) return "estado-jugado";
  if (e.includes("pendiente")) return "estado-pendiente";
  if (e.includes("programado")) return "estado-programado";
  if (e.includes("horario libre")) return "estado-libre";

  return "estado-libre";
}

function esRegistroPendiente(registro) {
  if (!registro) return false;

  const pendiente = normalizar(registro.pendiente);
  const observaciones = normalizar(registro.observaciones);

  return (
    pendiente === "si" ||
    pendiente === "sí" ||
    pendiente === "pendiente" ||
    pendiente.includes("pendiente") ||
    observaciones.includes("pendiente") ||
    observaciones.includes("posterg")
  );
}

function esPendienteFixture(fila) {
  if (!fila) return false;

  const estado = normalizar(fila.estadoFixture);
  const observaciones = normalizar(fila.observaciones);

  return (
    estado.includes("pendiente") ||
    estado.includes("posterg") ||
    observaciones.includes("pendiente") ||
    observaciones.includes("posterg")
  );
}

function obtenerFilasPendientes(filas) {
  return filas.filter(fila => (
    !fila.esLibre &&
    normalizar(estadoFinal(fila)) === "pendiente"
  ));
}

function crearEncabezado(thead) {
  thead.innerHTML = `

}

function formatearFecha(fecha) {
  return String(fecha || "").trim();
}

function estadoFinal(fila) {
  if (fila._estado !== undefined) return fila._estado;
  if (fila.esLibre) return "Horario libre";

  if (fila.registro && esRegistroPendiente(fila.registro)) {
    return "Pendiente";
  }

  if (fila.registro && (fila.registro.resultadoWeb || fila.registro.ganador)) {
    return "Jugado";
  }

  if (esPendienteFixture(fila)) {
    return "Pendiente";
  }

  return "Programado";
}

function fechaFinal(fila) {
  if (fila._fecha !== undefined) return fila._fecha;

  if (fila.registro && fila.registro.fecha) {
    return formatearFecha(fila.registro.fecha);
  }

  return "";
}

function observacionFinal(fila) {
  if (fila._observacion !== undefined) return fila._observacion;

  const obs = fila.registro && fila.registro.observaciones
    ? fila.registro.observaciones
    : fila.observaciones || "";

  const fecha = fechaFinal(fila);

  if (normalizar(obs) === "adelantado" && fecha) {
    return "Adelantado el " + fecha;
  }

  return obs;
}

function resultadoFinal(fila) {
  if (fila._resultado !== undefined) return fila._resultado;

  if (fila.registro && fila.registro.resultadoWeb) {
    return resultadoResumido(fila.registro);
  }

  return "";
}

function prepararFila(fila, mapaSemanas) {
  const estado = estadoFinal(fila);
  const fecha = fechaFinal(fila);
  const observacion = observacionFinal(fila);
  const resultado = resultadoFinal(fila);
  const observacionNorm = normalizar(observacion);
  const adelantadoNorm = normalizar("Adelantado el " + fecha);
  const mostrarFechaJugado = Boolean(
    fecha &&
    estado === "Jugado" &&
    observacionNorm !== adelantadoNorm
  );

  fila._estado = estado;
  fila._fecha = fecha;
  fila._observacion = observacion;
  fila._resultado = resultado;
  fila._estadoClase = claseEstado(estado);
  fila._semanaLabel = etiquetaSemana(fila.semana, mapaSemanas);
  fila._busqueda = normalizar(fila.jugador1 + " " + fila.jugador2);
  fila._resultadoTablaHTML = resultado
    ? `<span class="resultado-tabla">${escapeHTML(resultado)}</span>`
    : "";
  fila._fechaTablaHTML = mostrarFechaJugado
    ? `<span class="fecha-tabla">Jugado el ${escapeHTML(fecha)}</span>`
    : "";
  fila._observacionTablaHTML = observacion
    ? `<span class="observacion-tabla">${escapeHTML(observacion)}</span>`
    : "";
  fila._resultadoBoxHTML = resultado
    ? `<div class="resultado-box"><span class="info-icon">🏆</span>${escapeHTML(resultado)}</div>`
    : "";
  fila._fechaBoxHTML = mostrarFechaJugado
    ? `<div class="fecha-box"><span class="info-icon">📅</span>Jugado el ${escapeHTML(fecha)}</div>`
    : "";
  fila._observacionBoxHTML = observacion

  return fila;
}

    tablaBusquedaBody.innerHTML = "";
    cardsBusqueda.innerHTML = "";

  let filasHTML = "";
  let cardsHTML = "";
  let encontrados = 0;
  let semanaAnterior = "";

  for (let i = 0; i < filas.length; i++) {
    const fila = filas[i];

    if (!fila._busqueda.includes(busqueda)) continue;

    if (semanaAnterior && fila.semana !== semanaAnterior) {
      filasHTML += crearSeparadorHTML(fila.semana, "naranja", mapaSemanas, fila._esSemanaProxima);
    }

    filasHTML += crearFilaTablaHTML(fila, mapaSemanas);
    cardsHTML += crearCardBusquedaHTML(fila, mapaSemanas);

    encontrados++;
    semanaAnterior = fila.semana;
  }

  if (encontrados === 0) {
    mensajeTabla("Sin resultados.", tablaBusquedaBody, cardsBusqueda);
    return;
  }

  crearEncabezado(tablaBusquedaHead);
  tablaBusquedaBody.innerHTML = filasHTML;
  cardsBusqueda.innerHTML = cardsHTML;
}

function leerFixture(csv) {
  const data = parseCSV(csv);
  const mapaSemanas = {};
  const filas = [];

  for (let i = 0; i < data.length; i++) {
    const cols = data[i];

    const c0 = String(cols[0] || "").trim();
    const jugador1 = String(cols[4] || "").trim();
    const jugador2 = String(cols[5] || "").trim();

    const esSeparadorSemana =
      c0 &&
      normalizar(c0).startsWith("semana") &&
      !jugador1 &&
      !jugador2;

    if (esSeparadorSemana) {
      const num = extraerNumeroSemana(c0);
      if (num) mapaSemanas[num] = c0;
      continue;
    }

    const semana = String(cols[0] || "").trim();
    const cancha = String(cols[1] || "").trim();
    const turno = String(cols[2] || "").trim();
    const categoria = String(cols[3] || "").trim();

    if (!semana || !turno) continue;

    const fechaSemana = String(cols[6] || "").trim();
    const estadoFixture = String(cols[7] || "").trim();
    const observaciones = String(cols[8] || "").trim();

    if (fechaSemana) {
      mapaSemanas[semana] = construirEtiquetaSemana(semana, fechaSemana, mapaSemanas);
    }

    const esLibre =
      jugador1 === "-" &&
      jugador2 === "-";

    filas.push({
      semana,
      cancha,
      turno,
      categoria,
      jugador1,
      jugador2,
      fechaSemana,
      estadoFixture,
      observaciones,
      esLibre,
      registro: null
    });
  }

  return { filas, mapaSemanas };
}

function leerRegistro(csv) {
  const data = parseCSV(csv);
  const registros = [];

  for (let i = 0; i < data.length; i++) {
    const cols = data[i];

    const jugador1 = String(cols[1] || "").trim();
    const jugador2 = String(cols[2] || "").trim();

    if (!jugador1 || !jugador2) continue;

    registros.push({
      fecha: String(cols[0] || "").trim(),
      jugador1,
      jugador2,
      pendiente: String(cols[3] || "").trim(),
      observaciones: String(cols[4] || "").trim(),
      resultadoWeb: String(cols[16] || "").trim(),
      ganador: String(cols[13] || "").trim(),
      claveExacta: claveExacta(jugador1, jugador2),
      claveOrdenada: claveOrdenada(jugador1, jugador2)
    });
  }

  return registros;
}

function cruzarDatos(filasFixture, registros) {
  const conteoFixtureOrdenado = new Map();
  const registrosExactos = new Map();
  const registrosOrdenados = new Map();

  for (let i = 0; i < filasFixture.length; i++) {
    const fila = filasFixture[i];

    if (!fila.jugador1 || !fila.jugador2 || fila.esLibre) continue;

    const k = claveOrdenada(fila.jugador1, fila.jugador2);
    conteoFixtureOrdenado.set(k, (conteoFixtureOrdenado.get(k) || 0) + 1);
  }

  for (let i = 0; i < registros.length; i++) {
    const registro = registros[i];

    registrosExactos.set(registro.claveExacta, registro);
    registrosOrdenados.set(registro.claveOrdenada, registro);
  }

  for (let i = 0; i < filasFixture.length; i++) {
    const fila = filasFixture[i];

    if (!fila.jugador1 || !fila.jugador2 || fila.esLibre) continue;

    const exacta = claveExacta(fila.jugador1, fila.jugador2);
    const ordenada = claveOrdenada(fila.jugador1, fila.jugador2);
    const registroExacto = registrosExactos.get(exacta);

    if (registroExacto) {
      fila.registro = registroExacto;
      continue;
    }

    if (conteoFixtureOrdenado.get(ordenada) === 1 && registrosOrdenados.has(ordenada)) {
      fila.registro = registrosOrdenados.get(ordenada);
    }
  }
}

function prepararFilas(filas, mapaSemanas) {
  for (let i = 0; i < filas.length; i++) {
    prepararFila(filas[i], mapaSemanas);
  }
}

function activarAccordionMobile(contenedor = accordionSemanas) {
  if (!contenedor) return;

  contenedor.addEventListener("click", e => {
    const btn = e.target.closest(".semana-btn");

    if (!btn || !contenedor.contains(btn)) return;

    const box = btn.closest(".semana-box");
    const activa = box.classList.contains("activa");

    contenedor.querySelectorAll(".semana-box.activa").forEach(b => {
      b.classList.remove("activa");
      const span = b.querySelector(".semana-toggle");
      if (span) span.textContent = "+";
    });

    if (!activa) {
      box.classList.add("activa");

      const span = btn.querySelector(".semana-toggle");
      if (span) span.textContent = "–";

      requestAnimationFrame(() => {
        const margenSuperior = 8;
        const posicionSemana = btn.getBoundingClientRect().top + window.pageYOffset - margenSuperior;

        window.scrollTo({
          top: posicionSemana,
          behavior: "smooth"
        });
      });
    }
  });
}

function activarBuscador(filas, mapaSemanas) {
  let rafId = 0;
  let ultimoValor = "";

  buscador.addEventListener("input", e => {
    ultimoValor = e.target.value;

    if (rafId) {
      cancelAnimationFrame(rafId);
    }

    rafId = requestAnimationFrame(() => {
      renderBusqueda(filas, mapaSemanas, ultimoValor);
      rafId = 0;
    });
  });
}

async function textoFetch(url) {
  const response = await fetch(url);

  if (!response.ok) {
    throw new Error("No se pudo cargar: " + url);
  }

  return response.text();
}

async function iniciar() {
  crearEncabezado(tablaPendientesHead);
  crearEncabezado(tablaCompletaHead);

  tablaBusquedaHead.innerHTML = "";
  tablaBusquedaBody.innerHTML = "";
  cardsBusqueda.innerHTML = "";

  tablaPendientesBody.innerHTML = `
    <tr>
      <td colspan="8" class="mensaje">Cargando partidos pendientes...</td>
    </tr>
  `;
  accordionPendientes.innerHTML = `<div class="mensaje">Cargando partidos pendientes...</div>`;

  tablaCompletaBody.innerHTML = `
    <tr>
      <td colspan="8" class="mensaje">Cargando programación completa...</td>
    </tr>
  `;
  accordionSemanas.innerHTML = `<div class="mensaje">Cargando programación completa...</div>`;

  try {
    const [fixtureCSV, registroCSV] = await Promise.all([
      textoFetch(FIXTURE_URL),
      textoFetch(REGISTRO_URL)
    ]);

    const { filas, mapaSemanas } = leerFixture(fixtureCSV);
    const registros = leerRegistro(registroCSV);

    cruzarDatos(filas, registros);
    marcarSemanaProxima(filas, obtenerSemanaProxima(filas));
    prepararFilas(filas, mapaSemanas);

    renderBusqueda(filas, mapaSemanas, "");
    renderPendientesDesktop(filas, mapaSemanas);
    renderPendientesMobile(filas, mapaSemanas);
    renderCompletaDesktop(filas, mapaSemanas);
    renderCompletaMobile(filas, mapaSemanas);
    activarAccordionMobile(accordionPendientes);
    activarAccordionMobile(accordionSemanas);
    activarBuscador(filas, mapaSemanas);
  } catch (error) {
    mensajeTabla(
      "No se pudo cargar la programación.",
      tablaBusquedaBody,
      cardsBusqueda
    );

    tablaPendientesBody.innerHTML = `
      <tr>
        <td colspan="8" class="mensaje">No se pudieron cargar los partidos pendientes.</td>
      </tr>
    `;
    accordionPendientes.innerHTML = `<div class="mensaje">No se pudieron cargar los partidos pendientes.</div>`;

    tablaCompletaBody.innerHTML = `
      <tr>
        <td colspan="8" class="mensaje">No se pudo cargar la programación completa.</td>
      </tr>
    `;
    accordionSemanas.innerHTML = `<div class="mensaje">No se pudo cargar la programación completa.</div>`;
  }
}

iniciar();
</script>
